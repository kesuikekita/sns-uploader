<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SNS素材アップ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap');
:root{--bg:#0d0d0d;--surface:#171717;--card:#1f1f1f;--border:#2c2c2c;--gold:#d49a28;--gold-bg:rgba(212,154,40,0.10);--red:#d13535;--red-bg:rgba(209,53,53,0.10);--text:#eeeeee;--muted:#5a5a5a;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:48px;-webkit-font-smoothing:antialiased;}
.hdr{display:flex;align-items:center;gap:11px;padding:16px 18px 14px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;}
.hdr-icon{font-size:26px;line-height:1;}
.hdr-name{font-family:'Oswald',sans-serif;font-size:19px;letter-spacing:2px;line-height:1;}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.hdr-right{margin-left:auto;display:flex;gap:8px;}
.hdr-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;padding:7px 13px;border-radius:100px;cursor:pointer;}
.page{display:none;}.page.on{display:block;}
.sec{padding:22px 18px 0;}
.lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.store-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.s-card{border:2px solid var(--border);border-radius:var(--r);padding:18px 10px 15px;background:var(--surface);cursor:pointer;text-align:center;transition:border-color .15s,background .15s,transform .1s;user-select:none;}
.s-card:active{transform:scale(.97);}
.s-card.nickou{border-color:var(--gold);background:var(--gold-bg);}
.s-card.osio{border-color:var(--red);background:var(--red-bg);}
.s-emo{font-size:30px;margin-bottom:7px;}.s-name{font-size:12px;font-weight:700;line-height:1.4;}.s-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.txt-in{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;padding:14px 16px;outline:none;transition:border-color .2s;}
.txt-in:focus{border-color:#444;}.txt-in::placeholder{color:var(--muted);font-size:13px;}
.tag-row{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:8px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;user-select:none;}
.chip:active{transform:scale(.95);}
.chip.on{color:var(--text);background:var(--card);border-color:#484848;}
.chip.on.g{border-color:var(--gold);color:var(--gold);background:var(--gold-bg);}
.chip.on.r{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.drop{border:2px dashed var(--border);border-radius:var(--r);padding:28px 20px;text-align:center;background:var(--surface);cursor:pointer;transition:all .2s;position:relative;}
.drop input{position:absolute;inset:0;opacity:0;width:100%;cursor:pointer;}
.drop.g{border-color:var(--gold);background:var(--gold-bg);border-style:solid;}
.drop.r{border-color:var(--red);background:var(--red-bg);border-style:solid;}
.dz-ico{font-size:32px;margin-bottom:8px;}.dz-main{font-size:14px;font-weight:700;}.dz-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:11px;}
.th{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--card);position:relative;}
.th img,.th video{width:100%;height:100%;object-fit:cover;}
.th-ico{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:4px;font-size:22px;}
.th-ext{font-size:9px;color:var(--muted);}
.th-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.75);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:13px;font-family:monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;}
textarea.memo{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:14px 16px;resize:none;outline:none;min-height:80px;line-height:1.6;transition:border-color .2s;}
textarea.memo:focus{border-color:#444;}textarea.memo::placeholder{color:var(--muted);font-size:13px;}
.sub-wrap{padding:20px 18px 0;}
.sub-btn{width:100%;padding:18px;border-radius:var(--r);border:none;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:900;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.5px;}
.sub-btn:active{transform:scale(.98);}.sub-btn:disabled{opacity:.3;cursor:not-allowed;}
.sub-btn.g{background:var(--gold);color:#000;}.sub-btn.r{background:var(--red);color:#fff;}.sub-btn.off{background:#222;color:var(--muted);}
.progress-wrap{padding:16px 18px 0;display:none;}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:6px;transition:width .3s ease;width:0%;}
.progress-msg{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;}
.done-box{margin:16px 18px 0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;display:none;}
.done-box.on{display:block;animation:up .3s ease;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.done-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.drow{display:flex;gap:8px;margin-bottom:9px;align-items:flex-start;}
.dkey{font-size:11px;color:var(--muted);min-width:56px;padding-top:2px;flex-shrink:0;}
.dval{font-size:13px;line-height:1.6;flex:1;}
.act-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;margin-top:10px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .15s;}
.act-btn:active{background:#2a2a2a;}
.act-btn.sm{font-size:12px;color:var(--muted);padding:11px;}
.act-btn.sm.ok{color:#4caf50;border-color:#4caf50;}
.next-btn{width:100%;padding:14px;margin-top:10px;border-radius:var(--r);border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;}
/* ログインバナー */
.login-banner{margin:16px 18px 0;background:var(--surface);border:1.5px solid var(--gold);border-radius:var(--r);padding:16px;display:none;}
.login-banner.show{display:block;}
.login-banner-txt{font-size:13px;margin-bottom:12px;line-height:1.6;}
.login-google-btn{width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--gold);color:#000;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:900;cursor:pointer;}
/* ユーザー表示 */
.user-info{display:none;align-items:center;gap:8px;padding:8px 18px;background:var(--surface);border-bottom:1px solid var(--border);}
.user-info.show{display:flex;}
.user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;}
.user-name{font-size:11px;color:var(--muted);}
.user-logout{margin-left:auto;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;}
.hist-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 14px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;}
.hist-hdr-title{font-size:15px;font-weight:700;}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;padding:7px 13px;border-radius:100px;cursor:pointer;}
.hist-body{padding:16px 18px;}
.hi{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;animation:up .2s ease;}
.hi-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;}
.bg{background:var(--gold-bg);color:var(--gold);}.br{background:var(--red-bg);color:var(--red);}
.hi-time{font-size:11px;color:var(--muted);}.hi-who{font-size:11px;color:var(--muted);margin-bottom:6px;}
.hi-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.htag{font-size:10px;background:var(--card);padding:2px 8px;border-radius:100px;color:var(--muted);}
.hi-files{font-size:12px;color:var(--muted);}.hi-memo{font-size:12px;color:var(--text);margin-top:7px;line-height:1.5;}
.hist-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

<div class="page on" id="pg-upload">
  <div class="hdr">
    <div class="hdr-icon">🍜</div>
    <div><div class="hdr-name">SNS UPLOADER</div><div class="hdr-sub">にっこう / お塩浩太郎</div></div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="openHist()">📋 履歴</button>
      <button class="hdr-btn" onclick="location.href='admin.html'">🔐</button>
    </div>
  </div>

  <!-- ユーザー情報バー -->
  <div class="user-info" id="user-info">
    <img class="user-avatar" id="user-avatar" src="" alt="">
    <span class="user-name" id="user-name"></span>
    <button class="user-logout" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="sec">
    <div class="lbl">📍 店舗</div>
    <div class="store-row">
      <div class="s-card" id="cn" onclick="pickStore('nickou')"><div class="s-emo">🏮</div><div class="s-name">ラーメンにっこう</div><div class="s-sub">本店（滋賀・彦根）</div></div>
      <div class="s-card" id="co" onclick="pickStore('osio')"><div class="s-emo">💪</div><div class="s-name">お塩浩太郎</div><div class="s-sub">東大前店（東京）</div></div>
    </div>
  </div>

  <div class="sec">
    <div class="lbl">👤 撮影者 <span style="color:var(--red);font-size:11px;">必須</span></div>
    <input class="txt-in" id="who" type="text" placeholder="名前を入れてください" autocomplete="off" oninput="clearWhoErr()">
    <div id="who-err" style="display:none;color:var(--red);font-size:12px;margin-top:6px;">⚠️ 名前を入れてください</div>
  </div>

  <div class="sec">
    <div class="lbl">🏷 タグ（複数OK）</div>
    <div class="tag-row">
      <button class="chip" data-tag="仕込み" onclick="tog(this)">🔥 仕込み</button>
      <button class="chip" data-tag="メニュー" onclick="tog(this)">🍜 メニュー</button>
      <button class="chip" data-tag="カウントダウン" onclick="tog(this)">📅 カウントダウン</button>
      <button class="chip" data-tag="店内" onclick="tog(this)">🏠 店内</button>
      <button class="chip" data-tag="行列" onclick="tog(this)">👥 行列</button>
      <button class="chip" data-tag="完売" onclick="tog(this)">🎉 完売</button>
      <button class="chip" data-tag="限定" onclick="tog(this)">⭐ 限定</button>
      <button class="chip" data-tag="スタッフ" onclick="tog(this)">👨‍🍳 スタッフ</button>
      <button class="chip" data-tag="世界展開" onclick="tog(this)">🌍 世界展開</button>
      <button class="chip" data-tag="その他" onclick="tog(this)">📌 その他</button>
    </div>
  </div>

  <div class="sec">
    <div class="lbl">📁 ファイル</div>
    <div class="drop" id="dz">
      <input type="file" id="fi-input" multiple accept="image/*,video/*" onchange="addFiles(this.files)">
      <div class="dz-ico">📱</div><div class="dz-main">タップして選択</div><div class="dz-sub">写真・動画・複数選択OK</div>
    </div>
    <div class="thumbs" id="thumbs"></div>
  </div>

  <div class="sec">
    <div class="lbl">💬 メモ（任意）</div>
    <textarea class="memo" id="memo" placeholder="例：柚子を絞るスローシーン。「さぼりません」締めで投稿希望。"></textarea>
  </div>

  <div class="sub-wrap">
    <button class="sub-btn off" id="sbtn" disabled onclick="doSubmit()">店舗を選択してください</button>
  </div>

  <!-- Googleログインバナー -->
  <div class="login-banner" id="login-banner">
    <div class="login-banner-txt">📱 初回のみGoogleログインが必要です。<br>アップロード先のDriveにアクセスします。</div>
    <button class="login-google-btn" onclick="doLogin()">🔑 Googleでログイン</button>
  </div>

  <!-- プログレスバー -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-msg" id="progress-msg">📡 アップロード中...</div>
  </div>

  <div class="done-box" id="done">
    <div class="done-title">✅ アップロード完了！</div>
    <div id="done-detail"></div>
    <a class="act-btn" id="drive-link" href="#" target="_blank" style="display:none">📂 Driveフォルダを確認</a>
    <button class="act-btn sm" id="copy-btn" onclick="copyRec()">📋 情報をコピー</button>
    <button class="next-btn" onclick="reset()">＋ 次の素材をアップ</button>
  </div>
</div>

<div class="page" id="pg-history">
  <div class="hist-hdr">
    <div class="hist-hdr-title">📋 履歴（このデバイス）</div>
    <button class="back-btn" onclick="closeHist()">← 戻る</button>
  </div>
  <div class="hist-body" id="hist-body"></div>
</div>

<script>
// ── 設定 ──
const CLIENT_ID = '14134847265-mnss8osgro8urjop7j7nqidpksl5q728.apps.googleusercontent.com';
const GAS_URL   = 'https://script.google.com/macros/s/AKfycby3QKRHRHPz0d845UoJnPePGvEa_fX3JNrZQrsVfpDgMnGj5FJc51m_BQW2l6GhpuX1/exec';
const SHOPS = {
  nickou: { folderId:'1KGoCuw2yHSPLiptK5Sn3hEmen2EHhyc5', label:'ラーメンにっこう本店' },
  osio:   { folderId:'1wXTi56UBG2PrVkeCe9CsH_t93c4sKpRh', label:'お塩浩太郎 東大前店' }
};
const TAG_PREFIX={'仕込み':'shikomi','メニュー':'menu','カウントダウン':'countdown','店内':'interior','行列':'queue','完売':'sold-out','限定':'limited','スタッフ':'staff','世界展開':'world','その他':'other'};
const STORE_PREFIX={nickou:'nikkou',osio:'osio'};

let store=null, tags=[], files=[], accessToken=null, tokenClient=null;

// ── Google Identity Services 初期化 ──
window.addEventListener('load', () => {
  // 保存済みトークンを確認
  const saved = localStorage.getItem('gToken');
  if(saved) {
    accessToken = saved;
    showUserInfo();
  }
  // tokenClient初期化
  if(window.google) initTokenClient();
  else document.querySelector('script[src*="gsi"]').addEventListener('load', initTokenClient);
});

function initTokenClient(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: (resp) => {
      if(resp.access_token){
        accessToken = resp.access_token;
        localStorage.setItem('gToken', accessToken);
        showUserInfo();
        // ログイン後に自動送信
        if(pendingSubmit){ pendingSubmit=false; doSubmit(); }
      }
    }
  });
}

let pendingSubmit = false;

function doLogin(){
  pendingSubmit = true;
  tokenClient.requestAccessToken();
}

function doLogout(){
  accessToken = null;
  localStorage.removeItem('gToken');
  document.getElementById('user-info').classList.remove('show');
  document.getElementById('login-banner').classList.remove('show');
}

function showUserInfo(){
  // ユーザー情報をAPIで取得
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers:{ Authorization:'Bearer '+accessToken }
  }).then(r=>r.json()).then(u=>{
    if(u.error){ doLogout(); return; }
    document.getElementById('user-avatar').src = u.picture||'';
    document.getElementById('user-name').textContent = u.name||u.email||'';
    document.getElementById('user-info').classList.add('show');
    document.getElementById('login-banner').classList.remove('show');
  }).catch(()=>doLogout());
}

// ── UI操作 ──
function pickStore(s){
  store=s;
  document.getElementById('cn').className='s-card'+(s==='nickou'?' nickou':'');
  document.getElementById('co').className='s-card'+(s==='osio'?' osio':'');
  document.getElementById('dz').className='drop '+(s==='nickou'?'g':'r');
  document.querySelectorAll('.chip.on').forEach(c=>{c.classList.toggle('g',s==='nickou');c.classList.toggle('r',s==='osio');});
  syncBtn();
}
function tog(btn){
  const t=btn.dataset.tag;
  if(tags.includes(t)){tags=tags.filter(x=>x!==t);btn.classList.remove('on','g','r');}
  else{tags.push(t);btn.classList.add('on');if(store==='nickou')btn.classList.add('g');if(store==='osio')btn.classList.add('r');}
}
function addFiles(f){files=files.concat(Array.from(f));renderThumbs();syncBtn();}
function rmFile(i){files.splice(i,1);renderThumbs();syncBtn();}
function renderThumbs(){
  const g=document.getElementById('thumbs');g.innerHTML='';
  files.forEach((f,i)=>{
    const d=document.createElement('div');d.className='th';
    if(f.type.startsWith('image/')){const img=document.createElement('img');img.src=URL.createObjectURL(f);d.appendChild(img);}
    else if(f.type.startsWith('video/')){const v=document.createElement('video');v.src=URL.createObjectURL(f);v.muted=true;d.appendChild(v);}
    else{const ic=document.createElement('div');ic.className='th-ico';ic.innerHTML='📄<span class="th-ext">'+f.name.split('.').pop().toUpperCase()+'</span>';d.appendChild(ic);}
    const del=document.createElement('button');del.className='th-del';del.textContent='×';del.onclick=()=>rmFile(i);d.appendChild(del);g.appendChild(d);
  });
  const dz=document.getElementById('dz');
  if(files.length){dz.querySelector('.dz-ico').textContent='✅';dz.querySelector('.dz-main').textContent=files.length+'件選択中';dz.querySelector('.dz-sub').textContent='タップで追加';}
  else{dz.querySelector('.dz-ico').textContent='📱';dz.querySelector('.dz-main').textContent='タップして選択';dz.querySelector('.dz-sub').textContent='写真・動画・複数選択OK';}
}
function syncBtn(){
  const b=document.getElementById('sbtn');
  if(!store){b.textContent='店舗を選択してください';b.className='sub-btn off';b.disabled=true;}
  else if(!files.length){b.textContent='ファイルを選択してください';b.className='sub-btn off';b.disabled=true;}
  else{const lbl=store==='nickou'?'にっこう本店':'お塩浩太郎';b.textContent='📤 '+lbl+' にアップロード';b.className='sub-btn '+(store==='nickou'?'g':'r');b.disabled=false;}
}
function clearWhoErr(){document.getElementById('who-err').style.display='none';}
function sanitizeName(n){return n.replace(/\s+/g,'_').replace(/[\/\\:*?"<>|]/g,'');}
function buildFileName(orig,i,who){
  const now=new Date();
  const ymd=now.getFullYear().toString().slice(2)+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
  const sp=STORE_PREFIX[store]||store;
  const tp=tags.length?tags.map(t=>TAG_PREFIX[t]||t).join('-'):'general';
  const ext=orig.split('.').pop();
  return `${ymd}_${sp}_${tp}_${sanitizeName(who)}_${String(i+1).padStart(2,'0')}.${ext}`;
}
function setProgress(pct,msg){
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-msg').textContent=msg;
}

// ── Drive APIでファイルをアップロード ──
async function uploadToDrive(file, fileName, folderId){
  const meta = JSON.stringify({name:fileName, parents:[folderId]});
  const form = new FormData();
  form.append('metadata', new Blob([meta],{type:'application/json'}));
  form.append('file', file);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method:'POST',
    headers:{ Authorization:'Bearer '+accessToken },
    body: form
  });
  if(!res.ok){
    const err = await res.json();
    throw new Error(err.error?.message||'Drive upload failed');
  }
  return await res.json();
}

// ── 日付フォルダを取得or作成 ──
async function getOrCreateFolder(parentId, folderName){
  // 既存フォルダを検索
  const q = encodeURIComponent(`name='${folderName}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}`,{
    headers:{ Authorization:'Bearer '+accessToken }
  });
  const data = await res.json();
  if(data.files && data.files.length > 0) return data.files[0].id;

  // なければ作成
  const cr = await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',
    headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
    body: JSON.stringify({ name:folderName, mimeType:'application/vnd.google-apps.folder', parents:[parentId] })
  });
  const folder = await cr.json();
  return folder.id;
}

// ── メイン送信処理 ──
async function doSubmit(){
  const who = document.getElementById('who').value.trim();
  if(!who){document.getElementById('who-err').style.display='block';document.getElementById('who').scrollIntoView({behavior:'smooth',block:'center'});return;}

  // 未ログインならログイン画面を表示
  if(!accessToken){
    document.getElementById('login-banner').classList.add('show');
    document.getElementById('login-banner').scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  const memo = document.getElementById('memo').value.trim();
  const shop = SHOPS[store];
  const storeLabel = shop.label;
  const now = new Date();
  const date = now.toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const iso = now.toISOString();
  const renamedFiles = files.map((f,i)=>({file:f, renamed:buildFileName(f.name,i,who)}));

  document.getElementById('sbtn').disabled=true;
  document.getElementById('progress-wrap').style.display='block';
  setProgress(5,'準備中...');

  try{
    // 日付フォルダを取得or作成
    const dateStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    setProgress(10,'フォルダを確認中...');
    const subFolderId = await getOrCreateFolder(shop.folderId, dateStr);

    // ファイルを1つずつアップロード
    for(let i=0; i<renamedFiles.length; i++){
      setProgress(10+Math.round((i/renamedFiles.length)*75), `アップロード中 ${i+1}/${renamedFiles.length}...`);
      await uploadToDrive(renamedFiles[i].file, renamedFiles[i].renamed, subFolderId);
    }

    setProgress(90,'記録中...');

    // GASにスプレッドシート記録のみ依頼（no-cors）
    fetch(GAS_URL,{
      method:'POST', mode:'no-cors',
      body:JSON.stringify({
        action:'record', timestamp:iso, store, storeLabel, who,
        tags:tags.join(','), memo,
        files:renamedFiles.map(f=>f.renamed).join(','),
        fileCount:files.length
      })
    });

    setProgress(100,'完了！');

    // ローカル履歴
    const rec={id:Date.now(),store,storeLabel,who,tags:[...tags],files:renamedFiles.map(f=>({name:f.renamed})),memo,date};
    const hist=JSON.parse(localStorage.getItem('h')||'[]');
    hist.unshift(rec);localStorage.setItem('h',JSON.stringify(hist.slice(0,30)));

    // 完了表示
    const fileRows=renamedFiles.map(f=>`<div style="font-size:12px;color:var(--gold);word-break:break-all;margin-bottom:4px;">📄 ${f.renamed}</div>`).join('');
    document.getElementById('done-detail').innerHTML=`
      <div class="drow"><span class="dkey">店舗</span><span class="dval">${storeLabel}</span></div>
      <div class="drow"><span class="dkey">担当</span><span class="dval">${who}</span></div>
      <div class="drow"><span class="dkey">タグ</span><span class="dval">${tags.length?tags.join('　'):'（なし）'}</span></div>
      <div class="drow"><span class="dkey">ファイル</span><span class="dval">${fileRows}</span></div>
      ${memo?`<div class="drow"><span class="dkey">メモ</span><span class="dval">${memo}</span></div>`:''}
    `;
    const copyText=`【${storeLabel}】${date}\n担当：${who}\nタグ：${tags.join(' ')||'なし'}\nファイル：${renamedFiles.map(f=>f.renamed).join(', ')}\nメモ：${memo||'なし'}`;
    document.getElementById('copy-btn').dataset.copy=copyText;
    document.getElementById('progress-wrap').style.display='none';
    document.getElementById('done').classList.add('on');
    document.getElementById('sbtn').style.display='none';
    document.getElementById('done').scrollIntoView({behavior:'smooth',block:'start'});

  }catch(err){
    // トークン期限切れの場合は再ログイン
    if(err.message.includes('401')||err.message.includes('invalid')){
      doLogout();
      document.getElementById('login-banner').classList.add('show');
    }
    document.getElementById('progress-wrap').style.display='none';
    document.getElementById('sbtn').disabled=false;
    syncBtn();
    alert('❌ エラー：'+err.message);
  }
}

function copyRec(){
  const btn=document.getElementById('copy-btn');
  navigator.clipboard.writeText(btn.dataset.copy||'').then(()=>{btn.textContent='✅ コピーしました';btn.classList.add('ok');setTimeout(()=>{btn.textContent='📋 情報をコピー';btn.classList.remove('ok');},2000);});
}
function reset(){
  store=null;tags=[];files=[];
  document.getElementById('cn').className='s-card';document.getElementById('co').className='s-card';
  document.getElementById('dz').className='drop';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on','g','r'));
  document.getElementById('fi-input').value='';document.getElementById('who').value='';
  document.getElementById('who-err').style.display='none';
  document.getElementById('memo').value='';document.getElementById('thumbs').innerHTML='';
  document.getElementById('done').classList.remove('on');document.getElementById('sbtn').style.display='';
  document.getElementById('progress-wrap').style.display='none';
  document.getElementById('login-banner').classList.remove('show');
  const dz=document.getElementById('dz');
  dz.querySelector('.dz-ico').textContent='📱';dz.querySelector('.dz-main').textContent='タップして選択';dz.querySelector('.dz-sub').textContent='写真・動画・複数選択OK';
  syncBtn();window.scrollTo({top:0,behavior:'smooth'});
}
function openHist(){
  const list=document.getElementById('hist-body');
  const hist=JSON.parse(localStorage.getItem('h')||'[]');
  if(!hist.length){list.innerHTML='<div class="hist-empty">まだ履歴がありません</div>';}
  else{list.innerHTML=hist.map(r=>`<div class="hi"><div class="hi-hd"><span class="badge ${r.store==='nickou'?'bg':'br'}">${r.storeLabel}</span><span class="hi-time">${r.date}</span></div><div class="hi-who">👤 ${r.who||'不明'}</div>${r.tags.length?`<div class="hi-tags">${r.tags.map(t=>`<span class="htag">${t}</span>`).join('')}</div>`:''}<div class="hi-files">📁 ${r.files.map(f=>f.name).join('、')}</div>${r.memo?`<div class="hi-memo">💬 ${r.memo}</div>`:''}</div>`).join('');}
  document.getElementById('pg-upload').classList.remove('on');document.getElementById('pg-history').classList.add('on');window.scrollTo({top:0});
}
function closeHist(){document.getElementById('pg-history').classList.remove('on');document.getElementById('pg-upload').classList.add('on');}
</script>
